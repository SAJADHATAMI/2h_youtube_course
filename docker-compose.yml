version: '3.8'

# services
services:
  # app service
  app:
    build:
      context: .
      dockerfile: dockerfile
    image: django-image
    container_name: docker-django-con
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
  
  db:
    image: postgres:17
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: my_database
    ports:
    - "5432:5432"
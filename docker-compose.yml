version: '3.8'

# services
services:
  # app service
  app:
    build:
      context: .
      dockerfile: dockerfile
    image: django-image
    container_name: docker-django-con
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
  
  db:
    image: postgres:17
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postdb
      POSTGRES_PASSWORD: admin1
      POSTGRES_DB: admin1
    volumes:
      - postgres_data:/var/lib/postgrespq/data
    ports:
      - "5432:5432"

volumes:
  postgres_data: